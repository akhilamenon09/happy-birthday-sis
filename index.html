<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Chechi ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Pangolin&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ffafcc; --cream: #fefae0; }
        body { margin: 0; font-family: 'Pangolin', cursive; background-color: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* Welcome Page Stickers */
        .menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; z-index: 2; }
        .sticker { width: 120px; height: 120px; border-radius: 50%; border: 5px solid white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; animation: float 3s infinite ease-in-out; background-color: var(--pink); font-weight: bold; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        
        /* Memories Section */
        #gallery { background: #9b2226 url('kiss-bg.jpg') center/cover; }
        .polaroid-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .polaroid { background: white; padding: 10px 10px 30px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: subtleFloat 4s infinite ease-in-out; }
        .polaroid img { width: 160px; height: 160px; object-fit: cover; }
        @keyframes subtleFloat { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }

        /* Starry Cake Background */
        #stars { background: #090A0F; }
        .star-bg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } }

        /* Readable Text for Miss You */
        .readable-text { font-family: 'Pangolin', cursive; font-weight: normal; color: white; font-size: 1.2rem; max-width: 80%; line-height: 1.5; }

        .close-btn { position: absolute; bottom: 30px; right: 30px; background: #ffea00; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <h1>Happy Birthday, Chechi! 🌸</h1>
    <div class="menu">
        <div class="sticker" onclick="openBox('stars')">🎂 Wish</div>
        <div class="sticker" onclick="openBox('gallery')">📸 Memories</div>
        <div class="sticker" onclick="openBox('letter')">✉️ Note</div>
        <div class="sticker" onclick="openBox('missyou')">💖 Miss You</div>
    </div>

    <div id="stars" class="overlay">
        <div class="star-bg" id="starContainer"></div>
        <button class="close-btn" onclick="closeBox('stars')">BACK</button>
        <h2 style="color: white; z-index: 1;">Close your eyes, Chechi...</h2>
        <div style="font-size: 80px; cursor: pointer;" onclick="this.innerHTML='🍰'">🎂</div>
    </div>

    <div id="gallery" class="overlay">
        <button class="close-btn" onclick="closeBox('gallery')">BACK</button>
        <h1 style="color: white; font-family: 'Pacifico';">Memories</h1>
        <div class="polaroid-container">
            <div class="polaroid"><img src="chechi.jpg"></div>
            <div class="polaroid"><img src="photo2.jpg"></div>
            <div class="polaroid"><img src="photo3.jpg"></div>
        </div>
        <div style="color: white; font-family: 'Pacifico'; font-size: 2rem;">Together</div>
    </div>

    <div id="missyou" class="overlay" style="background: #cdb4db;">
        <button class="close-btn" onclick="closeBox('missyou')">BACK</button>
        <h1 style="color: white;">Enjoy your day! 🎈</h1>
        <p class="readable-text">Made this especially for you, my dearest chechi. Love you. I miss you tons!</p>
    </div>

    <script>
        const pass = prompt("Enter the secret code for Chechi:");
        if(pass !== "chechi123") { document.body.innerHTML = "<h1>🔒 Private!</h1>"; }

        function openBox(id) { 
            document.getElementById(id).style.display = 'flex'; 
            document.getElementById('bgMusic').play();
            if(id === 'stars') createStars();
        }
        function closeBox(id) { document.getElementById(id).style.display = 'none'; }

        function createStars() {
            const container = document.getElementById('starContainer');
            if(container.children.length > 0) return;
            for(let i=0; i<50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
    </script>
</body>
</html>
